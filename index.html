    <!-- JSON-LD structured data -->

    <!-- Favicon — %BASE_URL% is substituted by Vite at build time -->
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <link rel="apple-touch-icon" href="%BASE_URL%img/rbm_screenshot.png" />

    <!--
      GitHub Pages SPA path-restore — companion to public/404.html.
      Runs before React mounts: if the URL contains ?p=<path> (written by
      404.html after a deep-link 404), it silently rewrites the URL back to
      the original path so React Router sees the correct location.
    -->
    <script>
      (function () {
        var search = window.location.search;
        if (search.length > 1 && search[1] === 'p') {
          var params = search.slice(1).split('&').reduce(function (acc, part) {
            var kv = part.split('=');
            acc[kv[0]] = kv.slice(1).join('=').replace(/~and~/g, '&');
            return acc;
          }, {});
          if (params.p !== undefined) {
            var restored =
              window.location.pathname +
              (params.p ? params.p : '') +
              (params.q ? '?' + params.q : '') +
              window.location.hash;
            window.history.replaceState(null, null, restored);
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
