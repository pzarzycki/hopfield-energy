<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Energy-Based Memory Models</title>
    <!--
      GitHub Pages SPA redirect — based on https://github.com/rafgraph/spa-github-pages

      When GitHub Pages cannot find a file it serves this 404.html.
      The script below encodes the requested path into a ?p= query parameter
      and redirects to the repo root, which IS a real file (index.html).
      The index.html then silently restores the URL before React mounts.

      pathSegmentsToKeep = 1  →  keeps "/hopfield-energy" in the redirect target
    -->
    <script>
      (function () {
        var pathSegmentsToKeep = 1;
        var l = window.location;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
