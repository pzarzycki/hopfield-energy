<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Hopfield Energy Favicon</title>
  <desc id="desc">Stylized energy landscape with connected memory nodes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2f6bf0" />
      <stop offset="100%" stop-color="#163b8e" />
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.2" />
    </linearGradient>
  </defs>

  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#bg)" />

  <path
    d="M10 40 C 16 31, 22 52, 28 36 S 40 20, 46 34 S 54 38, 58 25"
    fill="none"
    stroke="url(#wave)"
    stroke-width="3.2"
    stroke-linecap="round"
  />

  <g fill="#ffffff">
    <circle cx="14" cy="30" r="3" />
    <circle cx="25" cy="46" r="2.8" />
    <circle cx="37" cy="23" r="3.2" />
    <circle cx="50" cy="35" r="3" />
  </g>

  <g stroke="#ffffff" stroke-opacity="0.7" stroke-width="1.6" fill="none">
    <path d="M14 30 L25 46 L37 23 L50 35" />
    <path d="M14 30 L37 23" stroke-opacity="0.4" />
    <path d="M25 46 L50 35" stroke-opacity="0.4" />
  </g>
</svg>